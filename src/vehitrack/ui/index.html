<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>vehitrack</title>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="/static/styles.css" rel="stylesheet" />
</head>
<body class="theme-dark">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="panel brand-panel">
        <div class="brand-title">vehitrack</div>
        <div id="mapStatus" class="muted">Loading map…</div>
      </div>

      <div class="panel">
        <div class="panel-title">Destination</div>
        <form id="searchForm" class="search-form">
          <input id="searchInput" type="text" placeholder="Search address or place" autocomplete="off" />
          <button id="searchBtn" type="submit">Search</button>
        </form>
        <div id="searchStatus" class="muted small">Offline search is ready when Nominatim is running.</div>
        <div id="selectedDestination" class="selected-destination">Destination: —</div>
        <div id="searchResults" class="results"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Route</div>
        <div id="routeStatus" class="muted small">Select a destination to build a route.</div>
        <div class="route-summary-grid">
          <div class="route-metric">
            <div class="route-metric-label">Distance</div>
            <div id="routeDistance" class="route-metric-value">—</div>
          </div>
          <div class="route-metric">
            <div class="route-metric-label">ETA</div>
            <div id="routeDuration" class="route-metric-value">—</div>
          </div>
        </div>
        <div id="routeMeta" class="muted small route-meta">Current GPS position → selected destination.</div>
        <div class="button-row two-up top-gap">
          <button id="routeBtn" type="button">Route to Destination</button>
          <button id="clearRouteBtn" type="button">Clear Route</button>
        </div>
      </div>

      <div class="panel controls-panel">
        <div class="panel-title">Trip</div>
        <div class="button-row two-up">
          <button id="startBtn" type="button">Start Trip</button>
          <button id="stopBtn" type="button">Stop Trip</button>
        </div>
        <div class="button-row three-up">
          <button id="csvBtn" type="button">Export CSV</button>
          <button id="gpxBtn" type="button">Export GPX</button>
          <button id="kmlBtn" type="button">Export KML</button>
        </div>
      </div>

      <div class="panel controls-panel">
        <div class="panel-title">Map Theme</div>
        <div class="button-row three-up">
          <button type="button" data-theme="light">Light</button>
          <button type="button" data-theme="dark">Dark</button>
          <button type="button" data-theme="amethyst">Amethyst</button>
        </div>
        <div class="button-row one-up top-gap">
          <button id="satelliteBtn" type="button">Satellite N/A</button>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Fix</div><div id="fixv" class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Speed</div><div id="speedv" class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Sats</div><div id="satsv" class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">HDOP</div><div id="hdopv" class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Age</div><div id="agev" class="stat-value">—</div></div>
        <div class="stat-card"><div class="stat-label">Trip</div><div id="tripv" class="stat-value">—</div></div>
      </div>

      <div class="panel info-panel">
        <div id="posv">Position: —</div>
        <div id="reasonv">Reason: —</div>
      </div>
    </aside>

    <main class="map-column">
      <div id="map"></div>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
