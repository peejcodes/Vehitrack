<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>USA PMTiles Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script>
fetch("http://localhost:8080/usa_z15.json")
  .then(r => {
    if (!r.ok) {
      throw new Error(`Failed to fetch TileJSON: ${r.status} ${r.statusText}`);
    }
    return r.json();
  })
  .then(tilejson => {
    const style = {
      version: 8,
      glyphs: "https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf",
      sources: {
        protomaps: {
          type: "vector",
          tiles: tilejson.tiles,
          minzoom: tilejson.minzoom,
          maxzoom: tilejson.maxzoom
        }
      },
      layers: [
        {
          id: "background",
          type: "background",
          paint: {
            "background-color": "#f2efe9"
          }
        },
        {
          id: "earth",
          type: "fill",
          source: "protomaps",
          "source-layer": "earth",
          paint: {
            "fill-color": "#e6e0d6"
          }
        },
        {
          id: "landuse",
          type: "fill",
          source: "protomaps",
          "source-layer": "landuse",
          paint: {
            "fill-color": "#d8e8c8"
          }
        },
        {
          id: "water",
          type: "fill",
          source: "protomaps",
          "source-layer": "water",
          paint: {
            "fill-color": "#9ec9ff"
          }
        },
        {
          id: "boundaries",
          type: "line",
          source: "protomaps",
          "source-layer": "boundaries",
          paint: {
            "line-color": "#9a9a9a",
            "line-width": 1
          }
        },
        {
          id: "roads",
          type: "line",
          source: "protomaps",
          "source-layer": "roads",
          paint: {
            "line-color": "#ffffff",
            "line-width": [
              "interpolate", ["linear"], ["zoom"],
              5, 0.5,
              10, 1,
              14, 2,
              15, 3
            ]
          }
        },
        {
          id: "place-labels",
          type: "symbol",
          source: "protomaps",
          "source-layer": "places",
          minzoom: 3,
          layout: {
            "text-field": ["coalesce", ["get", "name:en"], ["get", "name"]],
            "text-font": ["Noto Sans Regular"],
            "text-size": [
              "interpolate", ["linear"], ["zoom"],
              3, 10,
              6, 12,
              10, 14
            ]
          },
          paint: {
            "text-color": "#222222",
            "text-halo-color": "#ffffff",
            "text-halo-width": 1.5
          }
        },
        {
          id: "road-labels",
          type: "symbol",
          source: "protomaps",
          "source-layer": "roads",
          minzoom: 12,
          layout: {
            "symbol-placement": "line",
            "text-field": ["coalesce", ["get", "name:en"], ["get", "name"]],
            "text-font": ["Noto Sans Regular"],
            "text-size": 11
          },
          paint: {
            "text-color": "#333333",
            "text-halo-color": "#ffffff",
            "text-halo-width": 1.5
          }
        }
      ]
    };

    const map = new maplibregl.Map({
      container: "map",
      style: style,
      center: [-98.5795, 39.8283],
      zoom: 4
    });

    map.addControl(new maplibregl.NavigationControl(), "top-right");
  })
  .catch(err => {
    console.error(err);
    document.body.innerHTML = `<pre style="padding:16px; white-space:pre-wrap;">${String(err)}</pre>`;
  });
</script>
</body>
</html>
